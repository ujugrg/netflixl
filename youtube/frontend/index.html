<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar glass-panel">
      <div class="brand">
        <div class="brand-mark"></div>
        <div>
          <p class="eyebrow">Personal Streaming</p>
          <h1>Pulse</h1>
        </div>
      </div>

      <nav class="nav-links">
        <button class="nav-link active" data-route="home">Home</button>
        <button class="nav-link" data-route="search">Search</button>
        <button class="nav-link" data-route="library">Library</button>
      </nav>

      <section class="sidebar-section">
        <div class="section-header">
          <h2>Your Library</h2>
          <button id="new-playlist-btn" class="ghost-btn">New</button>
        </div>
        <div id="library-list" class="library-list"></div>
      </section>

      <section class="sidebar-section">
        <div class="section-header">
          <h2>Queue</h2>
          <button id="queue-toggle" class="ghost-btn">Open</button>
        </div>
        <p id="queue-count" class="muted">0 songs waiting</p>
      </section>
    </aside>

    <main class="main-view">
      <header class="topbar glass-panel">
        <div class="search-shell">
          <input id="global-search" type="search" placeholder="Search songs, artists, playlists">
        </div>
        <div class="topbar-actions">
          <button id="liked-sync-btn" class="pill-btn">Sync Liked</button>
        </div>
      </header>

      <section id="content" class="content"></section>
    </main>
  </div>

  <aside id="queue-drawer" class="queue-drawer glass-panel hidden">
    <div class="section-header">
      <h2>Queue</h2>
      <button id="close-queue" class="ghost-btn">Close</button>
    </div>
    <div id="queue-list" class="queue-list"></div>
  </aside>

  <div id="toast-root" class="toast-root"></div>

  <footer class="player glass-panel">
    <div class="now-playing">
      <img id="player-thumb" src="" alt="">
      <div class="track-copy">
        <h3 id="player-title">Nothing playing</h3>
        <p id="player-artist">Choose a song to start</p>
      </div>
      <button id="like-current-btn" class="icon-btn" title="Like song">♡</button>
    </div>

    <div class="player-core">
      <div class="controls-row">
        <button id="shuffle-btn" class="icon-btn" title="Shuffle">⇄</button>
        <button id="prev-btn" class="icon-btn" title="Previous">⏮</button>
        <button id="play-btn" class="play-btn" title="Play or pause">▶</button>
        <button id="next-btn" class="icon-btn" title="Next">⏭</button>
        <button id="repeat-btn" class="icon-btn" title="Repeat">↺</button>
      </div>
      <div class="timeline">
        <span id="current-time">0:00</span>
        <input id="progress-bar" type="range" min="0" max="100" value="0">
        <span id="duration-time">0:00</span>
      </div>
    </div>

    <div class="player-side">
      <button id="show-queue-btn" class="icon-btn" title="Queue">☰</button>
      <label class="volume-shell" for="volume-bar">
        <span>🔊</span>
        <input id="volume-bar" type="range" min="0" max="1" value="1" step="0.01">
      </label>
    </div>
  </footer>

  <audio id="audio-player" preload="metadata"></audio>
  <script src="/frontend/app.js"></script>
</body>
</html>
